name: Build Desktop App

on:
  push:
    branches:
      - main # Triggers the build every time you push to the main branch

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false # Prevents one OS failure from canceling the others
      matrix:
        # We build on all three major OS environments
        os: [macos-latest, ubuntu-latest, windows-latest]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Clears deprecation warnings

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Updated to latest LTS
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Build/Release Electron App
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # This will automatically create a GitHub Release and upload the files
          release: true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
